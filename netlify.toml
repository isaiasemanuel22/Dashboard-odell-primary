# Monorepo: rutas desde la raíz del repo (no usar base = frontend en la UI)
# Variable en Netlify: API_URL=https://odell-dashboard-api-dfb6810b38bf.herokuapp.com/api

[build]
  command = "cd frontend && npm ci && npm run build:prod"
  publish = "frontend/dist/frontend/browser"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--registry=https://registry.npmjs.org"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
