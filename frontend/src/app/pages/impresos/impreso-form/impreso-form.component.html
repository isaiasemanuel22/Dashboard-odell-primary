<app-form-modal
  [title]="impreso ? 'Editar impreso' : 'Nuevo impreso'"
  size="md"
  (close)="cancel.emit()"
>
  <db-form>
    <form (ngSubmit)="onSubmit()">
      <db-input
        label="Nombre"
        [(ngModel)]="name"
        name="name"
        placeholder="Ej: Logo, Estampa 25×25"
        [required]="true"
      />

      <db-select
        label="Tipo de papel"
        [(ngModel)]="paperType"
        name="paperType"
        [options]="paperTypeOptions"
      />

      <db-form-grid>
        <db-input
          label="Ancho (cm)"
          type="number"
          [(ngModel)]="widthCm"
          name="widthCm"
          [min]="0.1"
          [step]="0.1"
          [required]="true"
        />
        <db-input
          label="Alto (cm)"
          type="number"
          [(ngModel)]="heightCm"
          name="heightCm"
          [min]="0.1"
          [step]="0.1"
          [required]="true"
        />
      </db-form-grid>

      <div class="cost-preview">
        <span>Tamaño: {{ dimensionsLabel }}</span>
        <strong>Costo estimado del papel: {{ estimatedCost | currencyArs }}</strong>
        <small>Precio según configuración actual ($/m² en Ajustes)</small>
      </div>

      @if (error) {
        <db-form-error>{{ error }}</db-form-error>
      }

      <db-form-footer>
        <button type="button" class="btn secondary" (click)="cancel.emit()">
          Cancelar
        </button>
        <button
          type="submit"
          class="btn primary"
          [disabled]="loading || !name.trim() || widthCm <= 0 || heightCm <= 0"
        >
          {{ loading ? 'Guardando...' : (impreso ? 'Guardar cambios' : 'Crear impreso') }}
        </button>
      </db-form-footer>
    </form>
  </db-form>
</app-form-modal>
