<db-form>
  <form (ngSubmit)="onSubmit()" autocomplete="off">
    <db-select
      label="Categoría"
      [(ngModel)]="category"
      name="category"
      [options]="supplyCategoryOptions"
      (ngModelChange)="onCategoryChange()"
    />

    <db-select
      label="Tipo de insumo"
      [(ngModel)]="type"
      name="type"
      [options]="filteredSupplyTypeOptions"
      (ngModelChange)="onTypeChange()"
    />

    <db-input
      label="Nombre"
      [(ngModel)]="name"
      name="name"
      [required]="true"
    />

    @if (isFilament) {
      <db-select
        label="Tipo de filamento"
        [(ngModel)]="filamentType"
        name="filamentType"
        [options]="filamentTypeOptions"
        (ngModelChange)="onFilamentTypeChange()"
      />

      <db-select
        label="Marca (desde Ajustes)"
        [(ngModel)]="brand"
        name="brand"
        [required]="true"
        placeholder="Seleccionar marca..."
        [options]="filamentBrandOptions"
        (ngModelChange)="onBrandChange()"
      />
    }

    @if (isResin) {
      <db-select
        label="Tipo de resina"
        [(ngModel)]="resinType"
        name="resinType"
        [options]="resinTypeOptions"
        (ngModelChange)="onResinTypeChange()"
      />

      <db-select
        label="Marca (desde Ajustes)"
        [(ngModel)]="brand"
        name="brand"
        [required]="true"
        placeholder="Seleccionar marca..."
        [options]="resinBrandOptions"
        (ngModelChange)="onBrandChange()"
      />
    }

    <db-form-grid>
      <db-input
        [label]="'Cantidad (' + unit + ')'"
        type="number"
        [(ngModel)]="quantity"
        name="quantity"
        [min]="0"
        step="0.01"
        [required]="true"
      />
      <db-input
        label="Stock mínimo"
        type="number"
        [(ngModel)]="minStock"
        name="minStock"
        [min]="0"
        step="0.01"
        [required]="true"
      />
    </db-form-grid>

    <db-input
      [label]="'Precio unitario (ARS/' + unit + ')'"
      [hint]="priceHint"
      type="number"
      [(ngModel)]="unitPrice"
      name="unitPrice"
      [min]="0"
      [readonly]="!priceEditable"
      [required]="true"
    />

    <db-input
      label="Proveedor (opcional)"
      [(ngModel)]="supplier"
      name="supplier"
    />

    @if (error || configError) {
      <db-form-error>{{ error || configError }}</db-form-error>
    }

    <db-form-footer>
      <db-button
        label="Cancelar"
        variant="cancel"
        format="soft"
        (clicked)="cancel.emit()"
      />
      <db-button
        [label]="loading ? 'Guardando...' : (supply ? 'Guardar' : 'Crear insumo')"
        variant="primary"
        format="solid"
        buttonType="submit"
        [disabled]="loading"
      />
    </db-form-footer>
  </form>
</db-form>
